<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contador de 1 hora</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Felicidades por sobrevivir 26 años</h1>
      <section id="introSection" class="intro-card">
        <button id="showClueBtn" class="start-btn" type="button">Mostrar pista</button>
      </section>

      <section id="clueSection" class="clue-section is-hidden">
        <iframe
          width="560"
          height="315"
          src="https://www.youtube.com/embed/pd-WUEE4PzY?si=tYvTQcFQKprzWTbd"
          title="YouTube video player"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
        ></iframe>
      </section>

      <section id="gameSection" class="is-hidden">
        <p id="challengeMessage" class="subtitle"></p>

        <section class="timer-card" aria-live="polite">
          <p id="timer" class="timer">01:00:00</p>
          <p id="status" class="status">Esperando inicio...</p>
        </section>

        <section class="validation-card">
          <label class="validation-label" for="codeInput">Introduce el codigo:</label>
          <div class="validation-row">
            <input id="codeInput" class="code-input" type="text" disabled />
            <button id="validateBtn" class="validate-btn" type="button" disabled>Comprobar</button>
          </div>
          <p id="validationResult" class="validation-result">Validacion inactiva hasta iniciar.</p>
        </section>
      </section>

    </main>

    <script src="./script.js"></script>
  </body>
</html>
